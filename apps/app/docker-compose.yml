version: '3.8'
services:
  postgres:
    container_name: postgres-contact
    image: postgres:15
    user: root
    ports:
      - '${DB_PPORT}:5432'
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_DATABASE}
      HOSTNAME: ${DB_HOSTNAME}
      TZ: ${DB_TZ}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - ./db:/var/lib/postgresql/data
    networks:
      - contact-app

networks:
  contact-app:
    external: true
    name: contact-app
